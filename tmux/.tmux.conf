# Use zsh as default shell
set -g default-shell /bin/zsh

# Enable mouse support
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Use system clipboard on copy
set -g set-clipboard on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape-time delay (fixes vim/nvim lag)
set -sg escape-time 10

# Enable true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=white]%H:%M"

# Logging: pipe-pane shortcut (prefix + L to toggle)
bind L pipe-pane -o "cat >> /tmp/tmux-$(date +%Y%m%d).log" \; display "Logging toggled"
